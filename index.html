<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>사과 게임</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fdf7f2;
        --text: #2d1f16;
        --primary: #d94f30;
        --primary-dark: #b63b21;
        --card: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #ffe6d8, var(--bg));
        font-family: "Pretendard", "Apple SD Gothic Neo", sans-serif;
        color: var(--text);
        padding: 24px;
      }

      .game {
        width: min(680px, 100%);
        background: var(--card);
        border-radius: 18px;
        box-shadow: 0 24px 40px rgba(60, 22, 9, 0.12);
        padding: 22px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.3rem, 2.5vw, 2rem);
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .stats {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .pill {
        background: #fff2eb;
        border-radius: 999px;
        padding: 8px 12px;
        font-weight: 700;
      }

      .board {
        margin-top: 18px;
        height: 420px;
        border-radius: 16px;
        background: linear-gradient(180deg, #e3f2ff 0%, #bde0fe 45%, #88d498 100%);
        border: 2px solid rgba(56, 33, 21, 0.12);
        overflow: hidden;
        position: relative;
      }

      .apple {
        position: absolute;
        border: none;
        background: transparent;
        font-size: 2rem;
        cursor: pointer;
        transition: transform 0.1s;
        line-height: 1;
      }

      .apple:hover {
        transform: scale(1.15);
      }

      .controls {
        margin-top: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      button.action {
        border: none;
        border-radius: 10px;
        background: var(--primary);
        color: white;
        font-weight: 700;
        padding: 10px 16px;
        cursor: pointer;
      }

      button.action:hover {
        background: var(--primary-dark);
      }

      .message {
        font-weight: 600;
      }

      .help {
        margin-top: 8px;
        color: #634637;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main class="game">
      <div class="top">
        <h1>🍎 사과 게임</h1>
        <div class="stats">
          <div class="pill">점수: <span id="score">0</span></div>
          <div class="pill">남은 시간: <span id="time">30</span>초</div>
          <div class="pill">최고 점수: <span id="best">0</span></div>
        </div>
      </div>

      <section id="board" class="board" aria-label="게임 보드"></section>

      <div class="controls">
        <button id="start" class="action">게임 시작</button>
        <div id="message" class="message">버튼을 눌러 시작하세요!</div>
      </div>
      <p class="help">사과를 많이 클릭할수록 점수가 올라갑니다. 골든 사과(⭐)는 +3점!</p>
    </main>

    <script>
      const scoreEl = document.getElementById("score");
      const timeEl = document.getElementById("time");
      const bestEl = document.getElementById("best");
      const messageEl = document.getElementById("message");
      const boardEl = document.getElementById("board");
      const startBtn = document.getElementById("start");

      const GAME_TIME = 30;
      const MAX_APPLES = 8;
      const bestKey = "apple-game-best-score";

      let score = 0;
      let leftTime = GAME_TIME;
      let apples = [];
      let gameInterval;
      let appleInterval;
      let running = false;

      bestEl.textContent = localStorage.getItem(bestKey) || 0;

      function renderApple(apple) {
        const btn = document.createElement("button");
        btn.className = "apple";
        btn.textContent = apple.golden ? "⭐" : "🍎";
        btn.style.left = `${apple.x}%`;
        btn.style.top = `${apple.y}%`;
        btn.style.fontSize = apple.golden ? "2.2rem" : "2rem";
        btn.setAttribute("aria-label", apple.golden ? "골든 사과" : "사과");

        btn.addEventListener("click", () => {
          if (!running) return;
          score += apple.golden ? 3 : 1;
          scoreEl.textContent = score;
          apples = apples.filter((item) => item.id !== apple.id);
          btn.remove();
        });

        boardEl.appendChild(btn);
      }

      function spawnApple() {
        if (!running || apples.length >= MAX_APPLES) {
          return;
        }

        const id = crypto.randomUUID();
        const apple = {
          id,
          x: Math.floor(Math.random() * 90),
          y: Math.floor(Math.random() * 85),
          golden: Math.random() < 0.17,
        };

        apples.push(apple);
        renderApple(apple);
      }

      function clearBoard() {
        apples = [];
        boardEl.textContent = "";
      }

      function stopGame() {
        running = false;
        clearInterval(gameInterval);
        clearInterval(appleInterval);
        const best = Number(localStorage.getItem(bestKey) || 0);

        if (score > best) {
          localStorage.setItem(bestKey, score);
          bestEl.textContent = String(score);
          messageEl.textContent = `게임 종료! 🎉 새 최고 점수 ${score}점`;
        } else {
          messageEl.textContent = `게임 종료! 최종 점수 ${score}점`;
        }

        startBtn.disabled = false;
      }

      function startGame() {
        running = true;
        score = 0;
        leftTime = GAME_TIME;
        scoreEl.textContent = "0";
        timeEl.textContent = String(GAME_TIME);
        messageEl.textContent = "사과를 눌러 점수를 올리세요!";
        startBtn.disabled = true;
        clearBoard();

        spawnApple();
        spawnApple();

        appleInterval = setInterval(spawnApple, 650);
        gameInterval = setInterval(() => {
          leftTime -= 1;
          timeEl.textContent = String(leftTime);
          if (leftTime <= 0) {
            stopGame();
          }
        }, 1000);
      }

      startBtn.addEventListener("click", startGame);
    </script>
  </body>
</html>
